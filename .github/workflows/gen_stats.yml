name: Update README cards

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card dark
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide=contribs&hide_rank=true&line_height=24&card_width=100&hide_border=true&theme=dark
          path: cards/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate stats card light
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide=contribs&hide_rank=true&line_height=24&card_width=100&hide_border=true
          path: cards/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card dark
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&theme=dark
          path: cards/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate top languages card light
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true
          path: cards/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate time card dark
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=clement_gre&api_domain=wakapi.clgr.io&layout=compact&hide_border=true&langs_count=6&theme=dark
          path: cards/time-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate time card light
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: wakatime
          options: username=clement_gre&api_domain=wakapi.clgr.io&layout=compact&hide_border=true&langs_count=6
          path: cards/time-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/*.svg
          git commit -m "Update README cards" || exit 0
          git push
